<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Add Volunteer Modal</title>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: "Segoe UI", Arial, sans-serif;
}

body {
  height: 100vh;
  background: #0f172a;
  display: flex;
  align-items: center;
  justify-content: center;
}

/* Overlay */
.overlay {
  position: fixed;
  inset: 0;
  background: rgba(227, 223, 223, 0.6);
  display: flex;
  align-items: center;
  justify-content: center;
}

/* Modal */
.modal {
  width: 420px;
  background: #f8fafc;
  border-radius: 14px;
  padding: 22px;
  box-shadow: 0 20px 50px rgba(0,0,0,0.3);
  animation: fadeIn 0.3s ease;
}

@keyframes fadeIn {
  from { transform: translateY(20px); opacity: 0; }
  to { transform: translateY(0); opacity: 1; }
}

/* Header */
.modal-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 18px;
}

.modal-header h2 {
  font-size: 20px;
  color: #1e293b;
  font-weight: 600;
}

.close {
  cursor: pointer;
  font-size: 18px;
  color: #64748b;
  transition: 0.2s;
}

.close:hover {
  color: #ef4444;
}

/* Form */
.form-group {
  margin-bottom: 14px;
}

label {
  display: block;
  font-size: 13px;
  color: #334155;
  margin-bottom: 5px;
}

input, textarea {
  width: 100%;
  padding: 10px 12px;
  border-radius: 10px;
  border: 1px solid #cbd5e1;
  background: #f1f5f9;
  outline: none;
  transition: 0.25s;
  font-size: 14px;
}

/* Focus Effect */
input:focus, textarea:focus {
  border-color: #14b8a6;
  background: #ffffff;
  box-shadow: 0 0 0 3px rgba(20,184,166,0.15);
}

/* Textarea */
textarea {
  resize: none;
  height: 80px;
}

/* Buttons */
.buttons {
  display: flex;
  justify-content: flex-end;
  gap: 10px;
  margin-top: 12px;
}

.btn {
  padding: 9px 18px;
  border-radius: 10px;
  border: none;
  cursor: pointer;
  font-size: 14px;
  transition: 0.25s;
}

/* Cancel */
.btn-cancel {
  background: #e2e8f0;
  color: #1e293b;
}

.btn-cancel:hover {
  background: #cbd5e1;
}

/* Submit */
.btn-submit {
  background: #14b8a6;
  color: white;
  box-shadow: 0 5px 15px rgba(20,184,166,0.4);
}

.btn-submit:hover {
  background: #0d9488;
  transform: translateY(-1px);
  box-shadow: 0 8px 20px rgba(20,184,166,0.5);
}

</style>
</head>

<body>

<div class="overlay" id="modal">
  <div class="modal">

    <div class="modal-header">
      <h2>Add New Volunteer</h2>
      <span class="close" onclick="closeModal()">✕</span>
    </div>

    <div class="form-group">
      <label>Name *</label>
      <input type="text" placeholder="Full name">
    </div>

    <div class="form-group">
      <label>Email *</label>
      <input type="email" placeholder="email@example.com">
    </div>

    <div class="form-group">
      <label>Phone No *</label>
      <input type="text" placeholder="+91 9876543210">
    </div>

    <div class="form-group">
      <label>Location</label>
      <input type="text" placeholder="City or area">
    </div>

    <div class="form-group">
      <label>Qualification</label>
      <input type="text" placeholder="e.g. MBBS, B.Tech, MSW">
    </div>

    <!-- <div class="form-group">
      <label>Description</label>
      <textarea placeholder="Brief description of experience and interests..."></textarea>
    </div> -->

    <div class="buttons">
      <button class="btn btn-cancel" onclick="closeModal()">Cancel</button>
      <!-- <button class="btn btn-submit">Add Volunteer</button> -->

      <button class="btn btn-submit" onclick="addVolunteer()">Add Volunteer</button>
    </div>

  </div>
</div>

<script>
function closeModal() {
  // Same behavior for Cancel & Cross
  window.history.back();
}

function addVolunteer(event) {
  if (event) event.preventDefault();

  // Get existing values or default
  let total = localStorage.getItem("total") || 8;
  let available = localStorage.getItem("available") || 6;

  total = parseInt(total) + 1;
  available = parseInt(available) + 1;

  // Save updated values
  localStorage.setItem("total", total);
  localStorage.setItem("available", available);

  alert("✅ Volunteer added successfully!");

  // Go back
  window.history.back();
}
</script>
